<VirtualHost *:80>
    ServerName planara.example.com

    ProxyRequests Off
    ProxyPreserveHost On

    <LocationMatch "(?i)^/(?:\.env(?:\..*)?|\.git(?:/|$)|data(?:/|$)|server\.js$|package(?:-lock)?\.json$)">
        Require all denied
    </LocationMatch>

    RequestHeader set X-Forwarded-Proto "expr=%{REQUEST_SCHEME}"
    RequestHeader set X-Forwarded-Port "expr=%{SERVER_PORT}"

    LimitRequestBody 262144000

    ProxyPass        / http://127.0.0.1:4574/ retry=0 timeout=600
    ProxyPassReverse / http://127.0.0.1:4574/

    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set X-Frame-Options "DENY"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"

    ErrorLog ${APACHE_LOG_DIR}/planara-error.log
    CustomLog ${APACHE_LOG_DIR}/planara-access.log combined
</VirtualHost>
